<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@graph": [
        {
            "@type": "WebSite",
            "@id": "{{ .Site.BaseURL }}#website",
            "url": "{{ .Site.BaseURL }}",
            "name": "{{ .Site.Title }}",
            "publisher": {
                "@id": "{{ .Site.BaseURL }}#person"
            }
        },{
            "@type": "Person",
            "@id": "{{ .Site.BaseURL }}#person",
            "name": "Florian Müller",
            "honorificPrefix": "Prof. Dr.",
            "givenName": "Florian",
            "familyName": "Müller",
            "alternateName": ["Florian Mueller"],
            "url": "{{ .Site.BaseURL }}",
            "image": "{{ .Site.BaseURL }}img/profile.jpg",
            "jobTitle": "Assistant Professor for Mobile Human-Computer Interaction",
            "description": {{ .Site.Params.description | jsonify | safeJS }},
            "worksFor": {
                "@type": "CollegeOrUniversity",
                "name": "TU Darmstadt",
                "url": "https://www.tu-darmstadt.de/"
            },
            "affiliation": {
                "@type": "ResearchOrganization",
                "name": "{{ .Site.Params.labName }}",
                "url": "{{ .Site.Params.labUrl }}"
            },
            "sameAs": [
                "https://www.informatik.tu-darmstadt.de/hci/hci_tuda/team_hci/details_152256.en.jsp",
                "https://www.informatik.tu-darmstadt.de/hci/hci_tuda/urbanpage.en.jsp",
                "https://orcid.org/0000-0002-9621-6214",
                "https://scholar.google.com/citations?user=slfzfQIAAAAJ",
                "https://dblp.org/pid/m/FlorianMueller-3.html",
                "https://dl.acm.org/profile/81464642529",
                "https://www.linkedin.com/in/florian-mueller-hci",
                "https://github.com/flomuedev",
                "https://www.wikidata.org/wiki/Q130893717"
            ],
            "mainEntityOfPage": {
                "@id": "{{ .Site.BaseURL }}#webpage"
            },
            "knowsAbout": [
                "Human-Computer Interaction",
                "Mobile Human-Computer Interaction",
                "Extended Reality",
                "Embodied Interaction",
                "Human-AI Interaction"
            ]
        },{{- if .IsHome }}{
            "@type": ["WebPage", "AboutPage", "ProfilePage"],
            "@id": "{{ .Site.BaseURL }}#webpage",
            "url": "{{ .Site.BaseURL }}",
            "name": "Florian Müller — About",
            "description": {{ .Site.Params.description | jsonify | safeJS }},
            "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
            "inLanguage": "en",
            "isPartOf": {
                "@id": "{{ .Site.BaseURL }}#website"
            },
            "about": {
                "@id": "{{ .Site.BaseURL }}#person"
            },
            "mainEntity": {
                "@id": "{{ .Site.BaseURL }}#person"
            },
            "primaryImageOfPage": {
                "@type": "ImageObject",
                "@id": "{{ .Site.BaseURL }}#primaryimage",
                "url": "{{ .Site.BaseURL }}img/profile.jpg",
                "width": 1417,
                "height": 1418
            }
        }{{- else if eq .Type "publications" }}{
            "@type": ["WebPage", "CollectionPage"],
            "@id": "{{ .Permalink }}#webpage",
            "url": "{{ .Permalink }}",
            "name": {{ printf "%s | %s" .Title .Site.Title | jsonify | safeJS }},
            "description": {{ .Site.Params.description | jsonify | safeJS }},
            "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
            "inLanguage": "en",
            "about": {
                "@id": "{{ .Site.BaseURL }}#person"
            },
            "isPartOf": {
                "@id": "{{ .Site.BaseURL }}#website"
            }
        }{{- else if eq .Type "publication" }}{
            "@type": ["WebPage", "ItemPage"],
            "@id": "{{ .Permalink }}#webpage",
            "url": "{{ .Permalink }}",
            "name": {{ printf "%s | %s" .Title .Site.Title | jsonify | safeJS }},
            "description": {{ .Summary | plainify | htmlUnescape | jsonify | safeJS }},
            "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
            "inLanguage": "en",
            "isPartOf": {
                "@id": "{{ .Site.BaseURL }}#website"
            },
            "breadcrumb": {
                "@id": "{{ .Permalink }}#breadcrumb"
            },
            "mainEntity": {
                "@id": "{{ .Permalink }}#article"
            }
        },{
            "@type": "BreadcrumbList",
            "@id": "{{ .Permalink }}#breadcrumb",
            "itemListElement": [
                {
                    "@type": "ListItem",
                    "position": 1,
                    "name": "Home",
                    "item": "{{ .Site.BaseURL }}"
                },
                {
                    "@type": "ListItem",
                    "position": 2,
                    "name": "Publications",
                    "item": "{{ .Site.BaseURL }}publications/"
                },
                {
                    "@type": "ListItem",
                    "position": 3,
                    "name": {{ .Title | jsonify | safeJS }},
                    "item": "{{ .Permalink }}"
                }
            ]
        },{
            "@type": "ScholarlyArticle",
            "@id": "{{ .Permalink }}#article",
            "headline": {{ .Title | jsonify | safeJS }},
            "name": {{ .Title | jsonify | safeJS }},
            "author": [
                {{- $authors := split .Params.authors ", " -}}
                {{- range $i, $a := $authors -}}
                {{- if $i }},{{ end }}
                {
                    "@type": "Person",
                    "name": {{ $a | jsonify | safeJS }}
                    {{- if findRE `(?i)florian.*m.ller|m.ller.*florian` $a }},
                    "@id": "{{ $.Site.BaseURL }}#person"
                    {{- end }}
                }
                {{- end }}
            ],
            "datePublished": "{{ .Date.Format "2006-01-02" }}",
            "description": {{ with .Params.tldr_found }}{{ printf "%s %s" ($.Params.tldr_did | default "") . | strings.TrimLeft " " | jsonify | safeJS }}{{ else }}{{ $.Summary | plainify | htmlUnescape | jsonify | safeJS }}{{ end }},
            "isPartOf": {
                "@type": "CreativeWork",
                "name": {{ .Params.venue | jsonify | safeJS }}
            }
            {{- if .Params.doi }},
            "identifier": {
                "@type": "PropertyValue",
                "propertyID": "doi",
                "value": "{{ .Params.doi }}"
            },
            "url": "https://doi.org/{{ .Params.doi }}"
            {{- end }}
            {{- if .Params.publisher }},
            "publisher": {
                "@type": "Organization",
                "name": {{ .Params.publisher | jsonify | safeJS }}
            }
            {{- end }}
            {{- if .Params.pdf }},
            "encoding": {
                "@type": "MediaObject",
                "encodingFormat": "application/pdf",
                "contentUrl": "{{ .Site.BaseURL }}pdf/{{ .Params.pdf }}"
            }
            {{- end }},
            "mainEntityOfPage": {
                "@id": "{{ .Permalink }}#webpage"
            }
        }{{- else }}{
            "@type": "WebPage",
            "@id": "{{ .Permalink }}#webpage",
            "url": "{{ .Permalink }}",
            "name": {{ printf "%s | %s" .Title .Site.Title | jsonify | safeJS }},
            "description": {{ with .Description }}{{ . | jsonify | safeJS }}{{ else }}{{ .Site.Params.description | jsonify | safeJS }}{{ end }},
            "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
            "inLanguage": "en",
            "isPartOf": {
                "@id": "{{ .Site.BaseURL }}#website"
            }
        }{{- end }}
    ]
}
</script>
