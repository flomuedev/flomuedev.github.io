{{ define "main" }}
<script>
  (function() {
    var m = window.location.pathname.match(/^\/assets\/pdf\/(.+)$/);
    if (m) { window.location.replace('/pdf/' + m[1]); }
  })();
</script>

<section class="not-found-section">
  <div class="not-found-container fade-in">
    <div class="not-found-code" aria-hidden="true">404</div>
    <h1 class="not-found-title">Citation Not Found</h1>
    <p class="not-found-sub">This page seems to have been retracted.</p>
    <p class="not-found-body">
      We searched the entire proceedings but couldn't locate what you were looking for.
      It may have been desk-rejected, or perhaps it never made it past peer review.
    </p>
    <div class="not-found-actions">
      <a href="/" class="pub-action-btn primary">← Back to Home</a>
      <a href="/publications/" class="pub-action-btn secondary">Browse Publications</a>
    </div>
  </div>
</section>

<style>
  .not-found-section {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 72px);
    padding: var(--space-16) var(--space-6);
  }

  .not-found-container {
    max-width: 560px;
    text-align: center;
  }

  .not-found-code {
    font-size: clamp(6rem, 20vw, 10rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-light) 60%, var(--color-text-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: var(--space-6);
    user-select: none;
  }

  .not-found-title {
    font-size: var(--font-size-3xl);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--color-text);
    margin-bottom: var(--space-3);
  }

  .not-found-sub {
    font-size: var(--font-size-lg);
    font-weight: 500;
    color: var(--color-accent);
    margin-bottom: var(--space-5);
  }

  .not-found-body {
    font-size: var(--font-size-base);
    color: var(--color-text-muted);
    line-height: 1.7;
    margin-bottom: var(--space-10);
  }

  .not-found-actions {
    display: flex;
    gap: var(--space-4);
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
{{ end }}
