<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@graph": [
        {
            "@type": "WebSite",
            "@id": "{{ .Site.BaseURL }}#website",
            "url": "{{ .Site.BaseURL }}",
            "name": "{{ .Site.Title }}",
            "publisher": {
                "@id": "{{ .Site.BaseURL }}#person"
            }
        },{
            "@type": "Person",
            "@id": "{{ .Site.BaseURL }}#person",
            "name": "Florian Müller",
            "honorificPrefix": "Prof. Dr.",
            "givenName": "Florian",
            "familyName": "Müller",
            "alternateName": ["Florian Mueller"],
            "url": "{{ .Site.BaseURL }}",
            "image": "{{ .Site.BaseURL }}img/profile.jpg",
            "jobTitle": "Assistant Professor for Mobile Human-Computer Interaction",
            "worksFor": {
                "@type": "CollegeOrUniversity",
                "name": "TU Darmstadt",
                "url": "https://www.tu-darmstadt.de/"
            },
            "affiliation": {
                "@type": "CollegeOrUniversity",
                "name": "TU Darmstadt",
                "url": "https://www.tu-darmstadt.de/"
            },
            "sameAs": [
                "https://www.informatik.tu-darmstadt.de/hci/hci_tuda/team_hci/details_152256.en.jsp",
                "https://www.informatik.tu-darmstadt.de/hci/hci_tuda/urbanpage.en.jsp",
                "https://orcid.org/0000-0002-9621-6214",
                "https://scholar.google.com/citations?user=slfzfQIAAAAJ",
                "https://dblp.org/pid/m/FlorianMueller-3.html",
                "https://dl.acm.org/profile/81464642529",
                "https://www.linkedin.com/in/florian-mueller-hci",
                "https://github.com/flomuedev",
                "https://www.wikidata.org/wiki/Q130893717"
            ]
        },{{- if .IsHome }}{
            "@type": ["WebPage", "AboutPage"],
            "@id": "{{ .Site.BaseURL }}#webpage",
            "url": "{{ .Site.BaseURL }}",
            "name": "Florian Müller — About",
            "description": "{{ .Site.Params.description }}",
            "isPartOf": {
                "@id": "{{ .Site.BaseURL }}#website"
            },
            "about": {
                "@id": "{{ .Site.BaseURL }}#person"
            },
            "mainEntity": {
                "@id": "{{ .Site.BaseURL }}#person"
            },
            "primaryImageOfPage": {
                "@type": "ImageObject",
                "@id": "{{ .Site.BaseURL }}#primaryimage",
                "url": "{{ .Site.BaseURL }}img/profile.jpg"
            }
        }{{- else }}{
            "@type": "WebPage",
            "@id": "{{ .Permalink }}#webpage",
            "url": "{{ .Permalink }}",
            "name": "{{ .Title }} | {{ .Site.Title }}",
            "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}",
            "isPartOf": {
                "@id": "{{ .Site.BaseURL }}#website"
            }
        }{{- end }}
    ]
}
</script>
