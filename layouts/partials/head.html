<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
<meta name="author" content="{{ .Site.Params.author }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description"
    content="{{ with .Description }}{{ . }}{{ else }}{{ with .Summary }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}{{ end }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ if .Params.preview }}{{ .Site.BaseURL }}publication_preview/{{ .Params.preview }}{{ else }}{{ .Site.BaseURL }}{{ strings.TrimPrefix "/" .Site.Params.profileImage }}{{ end }}">

<!-- Self-hosted Inter font -->
<style>
    @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/InterVariable.woff2') format('woff2');
    }

    @font-face {
        font-family: 'Inter';
        font-style: italic;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/InterVariable-Italic.woff2') format('woff2');
    }
</style>

{{ $style := resources.Get "css/style.css" | fingerprint }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}" integrity="{{ $style.Data.Integrity }}" crossorigin="anonymous">
<link rel="canonical" href="{{ .Permalink }}">

{{- partial "jsonld.html" . -}}

<!-- TelemetryDeck Analytics -->
{{ if hugo.IsProduction }}
<script defer src="https://cdn.telemetrydeck.com/websdk/telemetrydeck.min.js"
    data-app-id="A19A11BC-58CD-4EB7-83FA-40FFCFEB64F1"></script>
{{ end }}
